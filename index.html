<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中期末專題 - 台灣天氣預報系統</title>
    <style>
        :root {
            --space-dark: #0d0d1a;
            --purple-deep: #2d1b4e;
            --lavender-soft: #6c5ce7;
            --pink-sunset: #a29bfe;
            --warm-glow: #d4a5ff;
            --moon-light: #fdfae5;
            --white-glass: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            /* 背景調整：將按鈕的漸變色彩融入背景底部 */
            background: linear-gradient(180deg, 
                var(--space-dark) 0%, 
                var(--purple-deep) 35%, 
                var(--lavender-soft) 70%, 
                var(--warm-glow) 100%
            );
            background-attachment: fixed;
            color: white;
        }

        /* 月亮設計 */
        .moon {
            position: fixed;
            top: 8%;
            right: 12%;
            width: 100px;
            height: 100px;
            background: var(--moon-light);
            border-radius: 50%;
            box-shadow: 
                0 0 30px 5px rgba(253, 250, 229, 0.4),
                0 0 80px 20px rgba(253, 250, 229, 0.2),
                0 0 160px 40px rgba(212, 165, 255, 0.2);
            z-index: 1;
            animation: moonPulse 8s infinite ease-in-out;
        }

        @keyframes moonPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.04); filter: brightness(1.1); }
        }

        /* 漂浮的雲朵 - 配合背景色調 */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #ffffff;
            filter: blur(90px);
            opacity: 0.12;
            border-radius: 50%;
            animation: float 40s infinite linear;
        }

        @keyframes float {
            from { transform: translateX(-500px); }
            to { transform: translateX(calc(100vw + 500px)); }
        }

        /* 星光點點 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* 主要內容容器 */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 850px;
            padding: 3.5rem;
            background: var(--white-glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin: 2rem 0;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff 40%, #f3e5f5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .subtitle {
            font-size: 1.15rem;
            margin-bottom: 3rem;
            color: #ecebff;
            font-weight: 300;
        }

        .content-section {
            text-align: left;
            margin-bottom: 2.5rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .content-section:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .content-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .content-section h2::before {
            content: '';
            width: 8px;
            height: 24px;
            background: linear-gradient(to bottom, #fff, var(--warm-glow));
            margin-right: 15px;
            border-radius: 4px;
        }

        .content-section p {
            line-height: 1.9;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 下載按鈕 */
        .btn-container {
            margin-top: 1rem;
        }

        .download-btn {
            display: inline-block;
            padding: 1.2rem 3.2rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: #4b306a; /* 改為深紫色文字更清晰 */
            background: #ffffff; /* 純白按鈕在夢幻背景下最醒目 */
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .download-btn:hover {
            transform: scale(1.05);
            background: var(--warm-glow);
            color: white;
            box-shadow: 0 15px 40px rgba(108, 92, 231, 0.4);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #e0e0ff;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .container { padding: 2.5rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="stars" id="starField"></div>
    <div class="clouds" id="cloudField"></div>

    <div class="container">
        <header>
            <h1>台灣即時天氣預報系統</h1>
            <p class="subtitle">高中期末專題：數據可視化與大氣科學的探索</p>
        </header>

        <main>
            <div class="content-section">
                <h2>研究動機</h2>
                <p>
                    在這個數據導向的時代，如何將複雜的氣象資訊呈現給大眾？本專案透過串接 Open Data API，結合現代網頁美學，讓原本單調的天氣預報變得生動有趣。
                </p>
            </div>

            <div class="content-section">
                <h2>核心技術</h2>
                <p>
                    本系統利用 Python 處理氣象署開放資料，轉譯為 JSON 格式後，由 JavaScript 動態渲染。視覺上則強調「沉浸式體驗」，讓使用者在查詢天氣時也能感受夜空的靜謐。
                </p>
            </div>

            <div class="btn-container">
                <a href="#" class="download-btn" id="downloadBtn">獲取專案執行檔 (.exe)</a>
            </div>
        </main>

        <footer>
            <p>© 2024 高中期末專案成果展 - 指導老師：[老師名字]</p>
        </footer>
    </div>

    <script>
        function createStars() {
            const starField = document.getElementById('starField');
            const count = 130; 
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2.5 + Math.random() * 3) + 's';
                starField.appendChild(star);
            }
        }

        function createClouds() {
            const cloudField = document.getElementById('cloudField');
            const count = 5;
            for (let i = 0; i < count; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const size = 400 + Math.random() * 400;
                cloud.style.width = size + 'px';
                cloud.style.height = (size / 2.5) + 'px';
                cloud.style.top = Math.random() * 90 + 'vh';
                cloud.style.left = '-450px';
                cloud.style.animationDuration = (35 + Math.random() * 25) + 's';
                cloud.style.animationDelay = (Math.random() * 15) + 's';
                cloudField.appendChild(cloud);
            }
        }

        // 新增的專用下載函式
        function downloadGame() {
            // 直接指定同資料夾下的檔案名稱
            window.location.href = "111.exe";
        }

        // 在點擊按鈕時執行下載邏輯
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // 創建精美的提示框
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                color: #4b306a;
                padding: 12px 30px;
                border-radius: 50px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                z-index: 1000;
                font-weight: 600;
                animation: fadeIn 0.3s ease;
            `;
            feedback.innerText = '正在準備下載專案內容...';
            document.body.appendChild(feedback);
            
            // 延遲 1 秒後移除提示框，並呼叫 downloadGame 函式進行下載
            setTimeout(() => {
                feedback.remove();
                downloadGame();
            }, 1000);
        });

        window.onload = () => {
            createStars();
            createClouds();
        };
    </script>
</body>
</html>
